    <H2>Sistema excretor</H2>
    <p>El sistema excretor es como el equipo de limpieza y "basurero" de nuestro cuerpo. Su trabajo es recolectar y expulsar todas las sustancias de desecho y toxinas que nuestro organismo no necesita, para evitar enfermarnos. Lo hace principalmente a través de la orina y el sudor. </p>
